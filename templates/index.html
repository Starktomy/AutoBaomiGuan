<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保密观自动学习控制台</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: hsl(222, 30%, 8%);
            --glass-bg: hsla(222, 30%, 14%, 0.6);
            --glass-border: hsla(0, 0%, 100%, 0.08);
            --primary: hsl(250, 80%, 65%);
            --primary-glow: hsla(250, 80%, 65%, 0.45);
            --success: hsl(145, 80%, 45%);
            --success-glow: hsla(145, 80%, 45%, 0.4);
            --warning: hsl(40, 90%, 55%);
            --danger: hsl(355, 85%, 55%);
            --text-main: hsl(210, 20%, 98%);
            --text-muted: hsl(210, 10%, 65%);
            --terminal-bg: hsl(222, 40%, 6%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, hsla(250, 70%, 50%, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, hsla(145, 70%, 40%, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-main) 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Form Styling */
        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .form-section {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            background: rgba(0, 0, 0, 0.3);
        }

        .submit-btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--primary) 0%, hsl(265, 80%, 60%) 100%);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px var(--primary-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 26px var(--primary-glow);
            filter: brightness(1.1);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid var(--glass-border);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Stepper (Steps progress) */
        .stepper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 40px 0;
            position: relative;
            background: rgba(0, 0, 0, 0.15);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        @media (max-width: 768px) {
            .stepper {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .step-line {
                display: none !important;
            }
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 2;
            flex: 1;
            position: relative;
        }

        @media (max-width: 768px) {
            .step {
                flex-direction: row;
                text-align: left;
                gap: 15px;
            }
        }

        .step-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: hsl(222, 20%, 18%);
            border: 2px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.4s ease;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .step-icon {
                margin-bottom: 0;
            }
        }

        .step-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.4s ease;
        }

        /* Step States */
        .step.active .step-icon {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--primary-glow);
            animation: pulse-border 1.5s infinite alternate;
        }

        .step.active .step-label {
            color: var(--text-main);
            font-weight: 600;
        }

        .step.completed .step-icon {
            background: var(--success);
            border-color: var(--success);
            color: white;
            box-shadow: 0 0 10px var(--success-glow);
        }

        .step.completed .step-label {
            color: var(--success);
        }

        .step.failed .step-icon {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .step.failed .step-label {
            color: var(--danger);
        }

        .step-line {
            position: absolute;
            height: 2px;
            background: var(--glass-border);
            top: 39px; /* center of step-icon in container */
            left: 0;
            right: 0;
            z-index: 1;
            margin: 0 8%;
        }

        @keyframes pulse-border {
            from { box-shadow: 0 0 5px var(--primary-glow); }
            to { box-shadow: 0 0 20px var(--primary-glow); }
        }

        /* Terminal Logging Panel */
        .terminal-panel {
            background: var(--terminal-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
        }

        .terminal-header {
            background: hsla(222, 40%, 4%, 0.6);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-red { background: hsl(355, 80%, 60%); }
        .dot-yellow { background: hsl(40, 80%, 60%); }
        .dot-green { background: hsl(145, 80%, 50%); }

        .terminal-title {
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
        }

        .terminal-body {
            height: 280px;
            padding: 20px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        /* Custom scrollbar for terminal */
        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .terminal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ANSI colors rendering in HTML */
        .ansi-red { color: hsl(355, 85%, 65%); }
        .ansi-green { color: hsl(145, 80%, 55%); }
        .ansi-yellow { color: hsl(40, 90%, 60%); }
        .ansi-cyan { color: hsl(190, 85%, 60%); }
        .ansi-bold { font-weight: bold; }

        /* Certificate Alert Banner */
        .alert-card {
            background: linear-gradient(135deg, hsla(145, 80%, 45%, 0.15) 0%, hsla(145, 80%, 30%, 0.05) 100%);
            border: 1px solid var(--success);
            padding: 24px;
            border-radius: 16px;
            margin-top: 30px;
            display: none;
            animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1);
        }

        .alert-title {
            color: var(--success);
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-desc {
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .alert-desc a {
            color: var(--success);
            text-decoration: underline;
            font-weight: 600;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>保密观自动学习控制台</h1>
            <p>输入保密观账号与密码，全自动完成课程视频学习与答题考试</p>
        </header>

        <!-- Input Form -->
        <div class="form-container">
            <div class="form-section">
                <div class="input-group">
                    <label for="username">保密观账号</label>
                    <input type="text" id="username" placeholder="请输入手机号 / 账号" required>
                </div>
                <div class="input-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入登录密码" required>
                </div>
                <button type="button" id="start-btn" class="submit-btn">
                    <span class="spinner" id="btn-spinner"></span>
                    <span id="btn-text">一键启动全自动刷课</span>
                </button>
            </div>
        </div>

        <!-- Stepper -->
        <div class="stepper">
            <div class="step-line" id="step-line"></div>
            
            <div class="step" id="step-login">
                <div class="step-icon">1</div>
                <div class="step-label">登录校验</div>
            </div>
            
            <div class="step" id="step-study">
                <div class="step-icon">2</div>
                <div class="step-label">自动刷课</div>
            </div>
            
            <div class="step" id="step-progress">
                <div class="step-icon">3</div>
                <div class="step-label">进度校验</div>
            </div>
            
            <div class="step" id="step-exam">
                <div class="step-icon">4</div>
                <div class="step-label">自动答题</div>
            </div>
            
            <div class="step" id="step-done">
                <div class="step-icon">5</div>
                <div class="step-label">刷课成功</div>
            </div>
        </div>

        <!-- Realtime terminal logs -->
        <div class="terminal-panel">
            <div class="terminal-header">
                <div class="terminal-dots">
                    <div class="terminal-dot dot-red"></div>
                    <div class="terminal-dot dot-yellow"></div>
                    <div class="terminal-dot dot-green"></div>
                </div>
                <div class="terminal-title">live_logger.log</div>
                <div style="width: 40px;"></div> <!-- spacer -->
            </div>
            <div class="terminal-body" id="log-terminal">
                <div style="color: var(--text-muted);">[SYSTEM] 等待用户提交任务...</div>
            </div>
        </div>

        <!-- Certificate Prompt -->
        <div class="alert-card" id="success-alert">
            <div class="alert-title">
                🎉 任务已全部完成！
            </div>
            <div class="alert-desc">
                恭喜，系统已自动看完视频并成功以 <strong>100分</strong> 通过了培训考试！<br>
                由于防作弊政策，请您自行登录 <a href="https://www.baomi.org.cn" target="_blank">保密观官方网站 (www.baomi.org.cn)</a>，在您的个人空间中下载并打印结业证书。
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const logTerminal = document.getElementById('log-terminal');
        const successAlert = document.getElementById('success-alert');

        // Colorama ANSI colors to HTML map
        const ansiMap = {
            '\x1b[31m': '<span class="ansi-red">',
            '\x1b[32m': '<span class="ansi-green">',
            '\x1b[33m': '<span class="ansi-yellow">',
            '\x1b[36m': '<span class="ansi-cyan">',
            '\x1b[39m': '</span>',
            '\x1b[0m': '</span></span></span></span></span></span></span>' // simple tag closer hack
        };

        function parseAnsi(text) {
            let html = text;
            for (const [ansi, span] of Object.entries(ansiMap)) {
                html = html.split(ansi).join(span);
            }
            return html;
        }

        function appendLog(rawText) {
            const parsed = parseAnsi(rawText);
            const line = document.createElement('div');
            line.innerHTML = parsed;
            logTerminal.appendChild(line);
            
            // Auto scroll to bottom
            logTerminal.scrollTop = logTerminal.scrollHeight;
        }

        function updateSteps(currentStep, status) {
            // Reset all classes
            const stepIds = ['login', 'study', 'progress', 'exam', 'done'];
            
            stepIds.forEach((id) => {
                const el = document.getElementById(`step-${id}`);
                el.classList.remove('active', 'completed', 'failed');
            });

            // Map current step
            const index = stepIds.indexOf(currentStep);
            
            if (index !== -1) {
                // Preceding steps are completed
                for (let i = 0; i < index; i++) {
                    document.getElementById(`step-${stepIds[i]}`).classList.add('completed');
                }
                
                const currentEl = document.getElementById(`step-${currentStep}`);
                
                if (status === 'success' && currentStep === 'done') {
                    currentEl.classList.add('completed');
                } else if (status === 'failed') {
                    currentEl.classList.add('failed');
                } else {
                    currentEl.classList.add('active');
                }
            }
        }

        startBtn.addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('请填写完整的账号和密码！');
                return;
            }

            // Reset UI states
            logTerminal.innerHTML = '<div style="color: var(--text-muted);">[SYSTEM] 正在向服务器提交任务...</div>';
            successAlert.style.display = 'none';
            updateSteps('login', 'pending');

            // Set loading state
            startBtn.disabled = true;
            btnSpinner.style.display = 'inline-block';
            btnText.textContent = '任务执行中...';

            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || '提交任务失败');
                }

                const taskId = data.task_id;
                appendLog(`[SYSTEM] 任务成功创建，ID: ${taskId}，正在连接日志流...`);

                // Start SSE to capture logs
                const eventSource = new EventSource(`/api/logs/${taskId}`);

                eventSource.onmessage = (event) => {
                    const payload = JSON.parse(event.data);
                    
                    if (payload.msg) {
                        appendLog(payload.msg);
                    }
                    
                    if (payload.step) {
                        updateSteps(payload.step, payload.status);
                    }

                    if (payload.done) {
                        eventSource.close();
                        
                        // Restore button
                        startBtn.disabled = false;
                        btnSpinner.style.display = 'none';
                        btnText.textContent = '一键启动全自动刷课';
                        
                        if (payload.status === 'success') {
                            successAlert.style.display = 'block';
                            successAlert.scrollIntoView({ behavior: 'smooth' });
                        }
                    }
                };

                eventSource.onerror = (err) => {
                    appendLog('\x1b[31m[SYSTEM] 日志连接发生异常中断。\x1b[0m');
                    eventSource.close();
                    startBtn.disabled = false;
                    btnSpinner.style.display = 'none';
                    btnText.textContent = '一键启动全自动刷课';
                };

            } catch (error) {
                appendLog(`\x1b[31m[SYSTEM] 错误: ${error.message}\x1b[0m`);
                startBtn.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.textContent = '一键启动全自动刷课';
                updateSteps('login', 'failed');
            }
        });
    </script>
</body>
</html>
